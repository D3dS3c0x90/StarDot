{%load static%}
<!DOCTYPE html>
<html lang="en-US" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <title>Star Dot Game</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://via.placeholder.com/32">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tabler-icons@latest/tabler-icons.min.css">
  <link rel="stylesheet" href="{% static './assets/style.css' %}">
  
</head>

<body>
  <main class="main" id="top">
    <div class="main-container">
      <!-- Header -->
      <div class="header mb-0">
        <h1>
          <i class="ti ti-star"></i>Star Dot إبدا لعبة
        </h1>
        <p>خمن 4 أرقام مختلفة</p>
      </div>

        <!-- Tab Navigation with Bootstrap - CENTERED -->
        <div class="d-flex justify-content-center mb-4" >
        <button class="tab-btn active m-1" onclick="switchTab('play', event)">
            <i class="ti ti-player-play"></i>إلعب
        </button>
        <button class="tab-btn m-1" onclick="switchTab('history', event)">
            <i class="ti ti-history"></i>تاريخ اللعب
        </button>
        </div>

      <!-- Play Tab -->
      <div id="play" class="tab-content active">
        <div class="content-wrapper">
          <!-- Left Section - Game Controls -->
          <div class="game-section">
            <h3><i class="ti ti-player-play"></i> إلعب</h3>

            <div class="selected-numbers">
              <p dir="rtl">الأرقام المُختارة:</p>
              <div class="selected-display" id="selectedDisplay">
                <p style="color: #999; font-size: 0.9rem;">إختر 4 أرقام</p>
              </div>
            </div>

            <div id="statusMessage"></div>

            <div class="numbers-grid" id="numbersGrid"></div>

            <div class="action-buttons">
              <button class="btn-game btn-reset" onclick="resetGame()">
                <i class="ti ti-refresh"></i> إمسح الأرقام
              </button>
              <button class="btn-game btn-submit" id="submitBtn" onclick="submitGuess()" disabled>
                <i class="ti ti-check"></i> إعتمد الأرقام
              </button>
            </div>
          </div>

          <!-- Right Section - Comparison -->
          <div class="comparison-section">
            <div class="friend-selector">
              <div class="friend-tabs" id="friendTabs">
                <!-- Friend tabs will be populated here -->
              </div>
            </div>

            <div class="comparison-header">
              <div class="column-header">
                <h4>{{ me.user_name }}</h4>
                <!-- <span class="badge">أنا</span> -->
              </div>
              <div class="column-header">
                <h4 id="friendNameDisplay">قلب حبوبي - {{ friend.user_name }}</h4>
                <!-- <span class="badge" id="friendBadge">زينب</span> -->
              </div>
            </div>

            <div class="comparison-columns">
              <div class="column" id="mySuggestions">
                <!-- My suggestions populated here -->
              </div>
              <div class="column" id="friendSuggestions">
                <!-- Friend suggestions populated here -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- History Tab -->
      <div id="history" class="tab-content">
        <div class="overall-stats">
          <div class="stat-card">
            <div class="stat-card-label">Total Played</div>
            <div class="stat-card-value" id="totalPlayed">8</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Wins</div>
            <div class="stat-card-value" style="color: var(--success-color);" id="totalWins">5</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Losses</div>
            <div class="stat-card-value" style="color: var(--danger-color);" id="totalLosses">3</div>
          </div>
          <div class="stat-card">
            <div class="stat-card-label">Win Rate</div>
            <div class="stat-card-value" id="winRate">63%</div>
          </div>
        </div>

        <div style="background: white; border-radius: 16px; padding: 2rem; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);">
          <div id="historyContent">
            <!-- History items will be populated here -->
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{% static './assets/javascript.js' %}"></script>

  <!-- Game Script -->
  <script>
    // Initialize game on page load
    document.addEventListener('DOMContentLoaded', initGame);
  </script>
</body>

</html>
